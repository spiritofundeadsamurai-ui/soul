<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <title>Soul — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a2e;
      --text: #e0e0e8; --text2: #8888aa; --accent: #7c3aed;
      --accent2: #a78bfa; --green: #22c55e; --red: #ef4444;
      --yellow: #eab308; --blue: #3b82f6; --cyan: #06b6d4;
      --border: #2a2a3e; --glow: rgba(124, 58, 237, 0.3);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-header .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-header .back { color: var(--text2); text-decoration: none; font-size: 13px; margin-left: auto; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; }
    .sidebar-header .back:hover { border-color: var(--accent); color: var(--text); }
    .new-chat-btn { margin: 12px 16px; padding: 10px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
    .new-chat-btn:hover { background: #6d28d9; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; display: flex; flex-direction: column; gap: 4px; }
    .session-item:hover { background: var(--bg3); }
    .session-item.active { background: var(--bg3); border: 1px solid var(--accent); }
    .session-item .sid { font-size: 12px; color: var(--accent2); font-weight: 600; }
    .session-item .preview { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .meta { font-size: 11px; color: var(--text2); opacity: 0.6; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
    .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
    .ws-dot.connected { background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* Chat area */
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 12px; }
    .chat-header .title { font-weight: 600; }
    .chat-header .model { font-size: 12px; color: var(--text2); margin-left: auto; }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-wrap: break-word; white-space: pre-wrap; }
    .message.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.assistant .meta { font-size: 11px; color: var(--text2); margin-top: 8px; opacity: 0.7; }
    .message.system { align-self: center; background: none; color: var(--text2); font-size: 13px; text-align: center; padding: 8px; }
    .message.thinking { align-self: flex-start; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-style: italic; }
    .message.thinking::after { content: ''; display: inline-block; width: 12px; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

    .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 4px; }
    .typing-indicator.show { display: flex; gap: 4px; align-items: center; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }

    /* Input */
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg2); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; resize: none; min-height: 44px; max-height: 150px; line-height: 1.5; transition: border-color 0.2s; }
    .input-row textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .input-row button { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 10px; cursor: pointer; font-size: 18px; transition: background 0.2s; flex-shrink: 0; }
    .input-row button:hover { background: #6d28d9; }
    .input-row button:disabled { background: var(--bg3); cursor: not-allowed; }
    .input-hint { font-size: 11px; color: var(--text2); margin-top: 6px; text-align: center; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-header .logo, .sidebar-header .back, .session-item .preview, .session-item .meta, .sidebar-footer span { display: none; }
      .new-chat-btn { font-size: 18px; padding: 8px; margin: 8px 6px; }
      .session-item .sid { font-size: 10px; text-align: center; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Soul</div>
      <a href="/" class="back">Dashboard</a>
    </div>
    <button class="new-chat-btn" onclick="newSession()">+ New Chat</button>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsStatus">Disconnected</span>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div class="title" id="chatTitle">Soul Chat</div>
      <div class="model" id="chatModel"></div>
    </div>
    <div class="messages" id="messages">
      <div class="message system">Start a conversation with Soul. Your sessions are shared with the CLI.</div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="chatInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
        <button id="voiceBtn" onclick="toggleVoice()" title="Voice input" style="background:var(--bg3);border:1px solid var(--border);font-size:16px;">&#127908;</button>
        <button id="sendBtn" onclick="sendMessage()">&#9654;</button>
      </div>
      <div class="input-hint">
        Enter to send | Shift+Enter for new line | &#127908; Voice input
        <span style="float:right;cursor:pointer" onclick="toggleTheme()" title="Toggle theme">&#127763;</span>
      </div>
    </div>
  </div>

  <script>
    let currentSession = null;
    let ws = null;
    let wsReconnectTimer = null;
    let pendingReply = null;
    const WS_URL = 'ws://' + location.host + '/ws';
    const API = '';

    // ─── WebSocket ───

    function connectWS() {
      if (ws && ws.readyState <= 1) return;
      try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }

      ws.onopen = () => {
        document.getElementById('wsDot').classList.add('connected');
        document.getElementById('wsStatus').textContent = 'Connected';
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.event === 'chat_response') handleChatResponse(msg.data);
          else if (msg.event === 'chat_thinking') showThinking(true);
          else if (msg.event === 'chat_error') handleChatError(msg.data);
        } catch {}
      };

      ws.onclose = () => {
        document.getElementById('wsDot').classList.remove('connected');
        document.getElementById('wsStatus').textContent = 'Disconnected';
        scheduleReconnect();
      };

      ws.onerror = () => ws.close();
    }

    function scheduleReconnect() {
      if (wsReconnectTimer) return;
      wsReconnectTimer = setTimeout(() => { wsReconnectTimer = null; connectWS(); }, 3000);
    }

    // ─── Chat via HTTP (fallback) + WS ───

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      addMessage('user', text);
      showThinking(true);
      document.getElementById('sendBtn').disabled = true;

      if (!currentSession) {
        currentSession = 'web_' + Date.now();
        loadSessions();
      }

      // Try WebSocket first, fallback to HTTP
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'chat', message: text, sessionId: currentSession }));
      } else {
        // HTTP fallback
        try {
          const token = localStorage.getItem('soul_token') || '';
          const res = await fetch(API + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ message: text, sessionId: currentSession }),
          });
          const data = await res.json();
          showThinking(false);
          if (data.reply) {
            const meta = [data.model, data.toolsUsed?.length ? 'tools: ' + data.toolsUsed.join(', ') : '', data.totalTokens ? data.totalTokens + ' tok' : ''].filter(Boolean).join(' | ');
            addMessage('assistant', data.reply, meta);
          } else {
            addMessage('system', 'Error: ' + (data.error || 'Unknown error'));
          }
        } catch (err) {
          showThinking(false);
          addMessage('system', 'Connection failed. Is soul-server running?');
        }
      }

      document.getElementById('sendBtn').disabled = false;
      loadSessions();
    }

    function handleChatResponse(data) {
      showThinking(false);
      document.getElementById('sendBtn').disabled = false;
      const meta = [data.model, data.toolsUsed?.length ? 'tools: ' + data.toolsUsed.join(', ') : '', data.totalTokens ? data.totalTokens + ' tok' : '', data.elapsed ? data.elapsed + 's' : ''].filter(Boolean).join(' | ');
      addMessage('assistant', data.reply, meta);
      loadSessions();
    }

    function handleChatError(data) {
      showThinking(false);
      document.getElementById('sendBtn').disabled = false;
      addMessage('system', 'Error: ' + (data.error || 'Unknown error'));
    }

    // ─── UI Helpers ───

    function addMessage(role, content, meta) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = content;
      if (meta && role === 'assistant') {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'meta';
        metaDiv.textContent = meta;
        div.appendChild(metaDiv);
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showThinking(show) {
      let indicator = document.querySelector('.typing-indicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        document.getElementById('messages').appendChild(indicator);
      }
      indicator.classList.toggle('show', show);
      if (show) document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 150) + 'px';
    }

    // ─── Sessions ───

    async function loadSessions() {
      try {
        const token = localStorage.getItem('soul_token') || '';
        const res = await fetch(API + '/api/chat/sessions', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const data = await res.json();
        renderSessions(data.sessions || []);
      } catch { renderSessions([]); }
    }

    function renderSessions(sessions) {
      const el = document.getElementById('sessionList');
      if (!sessions.length) { el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;font-size:13px">No sessions yet</div>'; return; }

      el.innerHTML = sessions.map(s => {
        const isActive = s.sessionId === currentSession;
        const shortId = s.sessionId.split('-')[0] || s.sessionId.substring(0, 8);
        const source = s.sessionId.startsWith('web_') ? 'Web' : 'CLI';
        return `<div class="session-item ${isActive ? 'active' : ''}" onclick="switchSession('${s.sessionId}')">
          <div class="sid">${shortId} (${source})</div>
          <div class="preview">${esc(s.lastMessage || '')}</div>
          <div class="meta">${s.messageCount} messages</div>
        </div>`;
      }).join('');
    }

    async function switchSession(sid) {
      currentSession = sid;
      document.getElementById('chatTitle').textContent = 'Session ' + sid.split('-')[0];

      // Load history
      const container = document.getElementById('messages');
      container.innerHTML = '';

      try {
        const token = localStorage.getItem('soul_token') || '';
        const res = await fetch(API + '/api/chat/history/' + sid, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const data = await res.json();
        if (data.messages?.length) {
          for (const msg of data.messages) {
            addMessage(msg.role, msg.content);
          }
        } else {
          addMessage('system', 'Empty session. Start chatting!');
        }
      } catch {
        addMessage('system', 'Could not load history.');
      }

      loadSessions();
    }

    function newSession() {
      currentSession = 'web_' + Date.now();
      document.getElementById('messages').innerHTML = '<div class="message system">New conversation started.</div>';
      document.getElementById('chatTitle').textContent = 'New Chat';
      loadSessions();
      document.getElementById('chatInput').focus();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // ─── Auth ───

    async function checkAuth() {
      const token = localStorage.getItem('soul_token');
      if (token) {
        // Verify token still works
        try {
          const res = await fetch(API + '/api/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
          if (res.ok) { document.getElementById('chatModel').textContent = 'Authenticated'; return true; }
          // Token expired — clear it
          localStorage.removeItem('soul_token');
        } catch {}
      }

      // Try without auth (some setups allow it)
      try {
        const res = await fetch(API + '/api/health');
        if (res.ok) {
          const data = await res.json();
          document.getElementById('chatModel').textContent = data.soul?.master ? 'Master: ' + data.soul.master : '';
          // If no master bound, chat works without auth
          if (!data.soul?.master) return true;
        }
      } catch {}

      // Show simple auth prompt
      const pass = prompt('Enter your Soul master passphrase:');
      if (!pass) return false;

      try {
        const res = await fetch(API + '/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passphrase: pass }),
        });
        const data = await res.json();
        if (data.verified && data.token) {
          localStorage.setItem('soul_token', data.token);
          document.getElementById('chatModel').textContent = 'Master: ' + data.master;
          return true;
        }
      } catch {}

      addMessage('system', 'Authentication failed. Reload to try again.');
      return false;
    }

    // ─── Chat History Persistence (localStorage) ───

    function saveChatLocal() {
      if (!currentSession) return;
      const msgs = document.getElementById('messages');
      const items = [];
      for (const el of msgs.children) {
        if (el.classList.contains('typing-indicator')) continue;
        const role = el.classList.contains('user') ? 'user' : el.classList.contains('assistant') ? 'assistant' : 'system';
        items.push({ role, text: el.childNodes[0]?.textContent || el.textContent });
      }
      try { localStorage.setItem('soul_chat_' + currentSession, JSON.stringify(items)); } catch {}
    }

    function loadChatLocal(sid) {
      try {
        const raw = localStorage.getItem('soul_chat_' + sid);
        if (!raw) return false;
        const items = JSON.parse(raw);
        const container = document.getElementById('messages');
        container.innerHTML = '';
        for (const item of items) addMessage(item.role, item.text);
        return items.length > 0;
      } catch { return false; }
    }

    // Auto-save after each message
    const _origAddMessage = addMessage;
    addMessage = function(role, content, meta) {
      _origAddMessage(role, content, meta);
      saveChatLocal();
    };

    // ─── Voice Input (Web Speech API) ───

    let _recognition = null;
    let _isRecording = false;

    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input not supported in this browser. Use Chrome or Edge.');
        return;
      }

      if (_isRecording) {
        _recognition.stop();
        _isRecording = false;
        document.getElementById('voiceBtn').style.borderColor = 'var(--border)';
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      _recognition = new SR();
      _recognition.lang = 'th-TH'; // Thai + English mixed
      _recognition.interimResults = true;
      _recognition.continuous = false;

      _recognition.onstart = () => {
        _isRecording = true;
        document.getElementById('voiceBtn').style.borderColor = 'var(--red)';
        document.getElementById('voiceBtn').style.color = 'var(--red)';
      };

      _recognition.onresult = (e) => {
        let transcript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        document.getElementById('chatInput').value = transcript;
      };

      _recognition.onend = () => {
        _isRecording = false;
        document.getElementById('voiceBtn').style.borderColor = 'var(--border)';
        document.getElementById('voiceBtn').style.color = 'white';
        // Auto-send if we got text
        const input = document.getElementById('chatInput');
        if (input.value.trim()) sendMessage();
      };

      _recognition.onerror = () => {
        _isRecording = false;
        document.getElementById('voiceBtn').style.borderColor = 'var(--border)';
        document.getElementById('voiceBtn').style.color = 'white';
      };

      _recognition.start();
    }

    // ─── Theme Toggle ───

    function toggleTheme() {
      const root = document.documentElement;
      const isDark = getComputedStyle(root).getPropertyValue('--bg').trim() === '#0a0a0f';
      if (isDark) {
        root.style.setProperty('--bg', '#f5f5f5');
        root.style.setProperty('--bg2', '#ffffff');
        root.style.setProperty('--bg3', '#e8e8ee');
        root.style.setProperty('--text', '#1a1a2e');
        root.style.setProperty('--text2', '#666688');
        root.style.setProperty('--border', '#d0d0e0');
        localStorage.setItem('soul_theme', 'light');
      } else {
        root.style.setProperty('--bg', '#0a0a0f');
        root.style.setProperty('--bg2', '#12121a');
        root.style.setProperty('--bg3', '#1a1a2e');
        root.style.setProperty('--text', '#e0e0e8');
        root.style.setProperty('--text2', '#8888aa');
        root.style.setProperty('--border', '#2a2a3e');
        localStorage.setItem('soul_theme', 'dark');
      }
    }

    // Apply saved theme
    if (localStorage.getItem('soul_theme') === 'light') toggleTheme();

    // ─── Init ───

    async function init() {
      const authed = await checkAuth();
      if (authed) {
        connectWS();
        loadSessions();
        // Restore last session from localStorage
        const lastSession = localStorage.getItem('soul_last_session');
        if (lastSession) {
          currentSession = lastSession;
          if (!loadChatLocal(lastSession)) {
            switchSession(lastSession);
          }
        }
      }
      document.getElementById('chatInput').focus();
    }

    // Save current session ID
    const _origSwitch = switchSession;
    switchSession = async function(sid) {
      localStorage.setItem('soul_last_session', sid);
      await _origSwitch(sid);
    };

    init();
  </script>
</body>
</html>
